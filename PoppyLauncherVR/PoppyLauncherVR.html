<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Poppy Playtime - Community VR Launcher</title>
    <script src="tailwind.js"></script>

    <style>
        @font-face {
            font-family: 'CustomGameFont';
            src: url('font.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        * {
            font-family: 'CustomGameFont', sans-serif !important;
        }

        body {
            margin: 0;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            background-color: #000000; 
            color: #ffffff;
        }

        .fade-in {
            animation: fadeIn 0.8s ease forwards;
        }

        .fade-in-up {
            animation: fadeInUp 0.8s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        .zoom-in-bg {
            animation: zoomInBg 1.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        .card-enter {
            animation: scaleUpFade 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes zoomInBg {
            from { transform: scale(1.1); filter: blur(10px); opacity: 0; }
            to { transform: scale(1); filter: blur(0); opacity: 1; }
        }

        @keyframes scaleUpFade {
            from { opacity: 0; transform: scale(0.95); filter: blur(5px); }
            to { opacity: 1; transform: scale(1); filter: blur(0); }
        }

        .minimal-spinner {
            width: 3.5rem;
            height: 3.5rem;
            border: 2px solid rgba(255, 255, 255, 0.1);
            border-top-color: #ffffff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        ::-webkit-scrollbar { display: none; }
    </style>
</head>

<body class="pywebview-drag-region h-screen w-screen m-0 flex flex-col relative overflow-hidden text-white">

    <button onclick="closeApp()" class="pywebview-no-drag absolute top-6 right-6 z-[999] text-white/40 hover:text-white transition-colors focus:outline-none cursor-pointer">
        <svg class="w-6 h-6 hover:scale-110 transition-transform pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
    </button>

    <div id="boot-screen" class="absolute inset-0 z-[100] bg-black flex flex-col items-center justify-center transition-opacity duration-1000 pointer-events-auto">
        <img src="ch1.jpg" class="absolute inset-0 w-full h-full object-cover opacity-30 grayscale mix-blend-screen pointer-events-none" alt="Fondo" />
        
        <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-black pointer-events-none"></div>

        <div class="relative z-10 w-full max-w-md flex flex-col items-center mt-auto mb-32 px-8">
            <h1 class="text-3xl md:text-4xl text-white/90 tracking-[0.2em] mb-2 text-center drop-shadow-lg" id="app-title">
                POPPY PLAYTIME
            </h1>
            <h2 class="text-xl text-white/50 tracking-[0.4em] mb-12 text-center" id="app-subtitle">COMMUNITY VR</h2>
            
            <div class="w-full h-[2px] bg-white/10 overflow-hidden rounded-full">
                <div id="boot-progress" class="h-full bg-white w-0 transition-all duration-100 ease-out shadow-[0_0_15px_rgba(255,255,255,0.8)]"></div>
            </div>
            
            <p id="boot-text" class="text-white/70 text-[10px] mt-4 tracking-[0.3em] uppercase"></p>
        </div>
    </div>

    <div id="main-ui" class="absolute inset-0 w-full h-full flex flex-col bg-black opacity-0 pointer-events-none transition-opacity duration-1000">
        
        <nav class="w-full flex justify-between items-center px-10 py-8 absolute top-0 z-50 pointer-events-auto">
            <div class="flex items-center gap-4">
                <div class="flex items-baseline gap-3">
                    <span class="font-bold text-xl tracking-[0.2em] text-white whitespace-nowrap">COMMUNITY <span class="text-white/50">VR</span></span>
                    <span class="text-[10px] font-bold text-white/40 tracking-[0.2em] uppercase hidden sm:block">v1.0.0-beta <span class="text-white/20">| build 230326</span></span>
                </div>
                
                <div class="w-px h-5 bg-white/20 hidden md:block"></div>
                
                <div class="flex items-center gap-2">
                    <button id="btn-uevr-version" onclick="toggleUevrVersion()" class="pywebview-no-drag px-3 py-2 rounded-md border hover:bg-white/20 hover:border-white/40 transition-all duration-300 text-[9px] font-bold tracking-widest cursor-pointer flex items-center justify-center uppercase bg-purple-900/40 border-purple-500/50 text-purple-200">
                        UEVR NIGHTLY
                    </button>
                </div>
            </div>
            
            <div></div>
        </nav>

        <div id="dynamic-view" class="absolute inset-0 w-full h-full z-0 overflow-hidden pointer-events-auto">
        </div>

    </div>

    <div id="update-modal" class="hidden absolute inset-0 z-[110] bg-black/80 backdrop-blur-md flex-col items-center justify-center pointer-events-auto fade-in">
        <div class="bg-[#0a0a0a] border border-blue-500/30 p-8 rounded-2xl w-full max-w-lg shadow-[0_0_30px_rgba(59,130,246,0.15)] relative flex flex-col items-center text-center">
            <svg class="w-12 h-12 text-blue-400 mb-4 drop-shadow-lg" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
            <h3 class="text-white/90 text-xl tracking-[0.15em] mb-2 font-bold uppercase" id="update-title"></h3>
            <p class="text-white/60 text-sm mb-8 leading-relaxed px-4" id="update-desc"></p>
            
            <div class="flex gap-4 w-full">
                <button onclick="closeUpdateModal()" class="pywebview-no-drag flex-1 py-3 rounded-full border border-white/20 bg-transparent hover:bg-white/5 transition-all text-white/70 hover:text-white text-xs font-bold tracking-[0.15em] uppercase" id="btn-update-ignore"></button>
                <button onclick="openUpdateUrl()" class="pywebview-no-drag flex-1 py-3 rounded-full bg-blue-600 text-white hover:bg-blue-500 transition-all text-xs font-bold tracking-[0.15em] uppercase shadow-[0_0_15px_rgba(59,130,246,0.4)]" id="btn-update-download"></button>
            </div>
        </div>
    </div>

    <div id="loading-view" class="hidden absolute inset-0 z-40 bg-black flex-col items-center justify-center pointer-events-auto fade-in">
        <img id="loading-bg" src="" class="absolute inset-0 w-full h-full object-cover opacity-20 grayscale transition-opacity duration-1000" />
        <div class="absolute inset-0 bg-black/80 backdrop-blur-sm z-0"></div>
        
        <div class="relative z-10 flex flex-col items-center w-full max-w-2xl px-6 text-center">
            <div class="minimal-spinner mb-10"></div>
            
            <h2 class="text-white/90 text-2xl md:text-3xl tracking-[0.15em] uppercase mb-6 drop-shadow-xl" id="loading-main-text"></h2>
            
            <div class="h-px w-24 bg-white/20 mx-auto mb-6"></div>
            
            <p id="loading-desc" class="text-white/50 tracking-[0.2em] text-[11px] md:text-xs uppercase leading-relaxed max-w-md"></p>
        </div>
    </div>

    <div id="error-view" class="hidden absolute inset-0 z-50 bg-black flex-col items-center justify-center pointer-events-auto fade-in">
        <svg class="w-12 h-12 text-white/50 mb-6 drop-shadow-lg" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"></path></svg>
        
        <div class="w-full max-w-md text-center px-6">
            <h2 id="error-title" class="text-white/90 text-2xl mb-2 tracking-widest"></h2>
            <div class="h-px w-16 bg-white/30 mx-auto mb-8"></div>
            
            <p id="error-message" class="text-white/60 text-sm mb-4 font-light leading-relaxed"></p>
            <p id="error-hint" class="text-white/40 text-xs italic tracking-wide mb-12"></p>
        </div>

        <button onclick="resetUI()" class="pywebview-no-drag px-8 py-3 bg-transparent border border-white/30 hover:bg-white/10 hover:border-white transition-all duration-300 text-white/90 text-xs tracking-[0.2em] uppercase cursor-pointer flex items-center gap-3 rounded-full group">
            <svg class="w-4 h-4 group-hover:-translate-x-1 transition-transform pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
            <span id="btn-error-back-text"></span>
        </button>
    </div>

    <div id="runtime-modal" class="hidden absolute inset-0 z-[60] bg-black/80 backdrop-blur-md flex-col items-center justify-center pointer-events-auto fade-in">
        <div class="bg-[#0a0a0a] border border-white/10 p-6 md:p-8 rounded-2xl w-full max-w-lg shadow-2xl relative">
            <button onclick="closeRuntimeModal()" class="pywebview-no-drag absolute top-4 right-4 text-white/40 hover:text-white transition-colors focus:outline-none cursor-pointer">
                <svg class="w-5 h-5 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"></path></svg>
            </button>
            <h3 class="text-white/90 text-xl tracking-[0.15em] mb-6 text-center uppercase font-bold" id="modal-title"></h3>
            
            <div class="flex flex-col gap-4 mb-8">
                <div id="opt-openxr" onclick="selectRuntime('openxr')" class="pywebview-no-drag p-4 rounded-xl border border-white bg-white/5 cursor-pointer hover:bg-white/10 transition-all flex items-start gap-4">
                    <div class="mt-1 w-4 h-4 shrink-0 rounded-full border border-white flex items-center justify-center">
                        <div class="w-2 h-2 rounded-full bg-white transition-all scale-100" id="dot-openxr"></div>
                    </div>
                    <div>
                        <div class="text-white/90 text-sm font-bold tracking-wider mb-1" id="txt-openxr-title"></div>
                        <div class="text-white/50 text-[10px] tracking-wide uppercase" id="txt-openxr-desc"></div>
                    </div>
                </div>

                <div id="opt-openvr" onclick="selectRuntime('openvr')" class="pywebview-no-drag p-4 rounded-xl border border-white/10 bg-black/50 cursor-pointer hover:bg-white/5 transition-all flex items-start gap-4">
                    <div class="mt-1 w-4 h-4 shrink-0 rounded-full border border-white/30 flex items-center justify-center">
                        <div class="w-2 h-2 rounded-full bg-white transition-all scale-0" id="dot-openvr"></div>
                    </div>
                    <div>
                        <div class="text-white/90 text-sm font-bold tracking-wider mb-1" id="txt-openvr-title"></div>
                        <div class="text-white/50 text-[10px] tracking-wide uppercase" id="txt-openvr-desc"></div>
                    </div>
                </div>
            </div>

            <button onclick="confirmRuntimeAndLaunch()" class="pywebview-no-drag w-full py-3 rounded-full bg-white text-black font-bold tracking-[0.2em] text-xs hover:bg-white/80 transition-colors uppercase shadow-[0_0_15px_rgba(255,255,255,0.2)]">
                <span id="btn-modal-launch"></span>
            </button>
        </div>
    </div>

    <script>
        const i18n = {
            en: {

                subtitle: "COMMUNITY VR",

                back_selector: "BACK TO CHAPTER SELECTOR",
                boot_1: "Verifying file integrity...",
                boot_2: "Loading interface modules...",
                boot_3: "System ready.",
                boot_init: "Booting UEVR system...",
                prep_vr_launch: "STARTING POPPY PLAYTIME IN VR...",
                prep_flat_launch: "STARTING POPPY PLAYTIME IN FLAT MODE...",
                err_unknown: "Unknown anomaly occurred in the system.",
                err_hint: "Verify the integrity of your local files.",
                chapter: "CHAPTER",
                runtime_title: "SELECT VR RUNTIME",
                openxr_title: "OPENXR (DEFAULT)",
                openxr_desc: "FASTER, HIGH PERFORMANCE, MAX QUALITY.<br>VIRTUAL DESKTOP OR META LINK.",
                openvr_title: "OPENVR / STEAMVR",
                openvr_desc: "HIGHER COMPATIBILITY WITH OLDER HEADSETS.<br>REQUIRES STEAMVR ACTIVE.",
                btn_launch_modal: "LAUNCH CHAPTER",
                update_title: "UPDATE AVAILABLE",
                update_desc: "A new version of the launcher ({v}) is available! Download it to enjoy new features and bug fixes.",
                btn_update_ignore: "LATER",
                btn_update_download: "DOWNLOAD"
            },
            es: {
                title: "POPPY PLAYTIME",
                subtitle: "COMMUNITY VR",
                prep_env: "Preparando entorno...",
                prep_desc_boot: "No cierre esta ventana.<br><br>El launcher está configurando y vinculando los archivos locales del mod VR.",
                prep_desc_launch: "No cierres esta ventana, y espera entre 1 a 2 minutos a que se inicialice todo.<br><br>En caso de que no aparezca nada, reinstala el instalador con la última versión y cuéntanos tu experiencia en el canal de Discord si no se soluciona tu problema.",
                fail_init: "FALLO AL INICIAR",
                btn_back: "Volver",
                btn_exit: "SALIR DEL LAUNCHER",
                ch_locked: "CAPÍTULO BLOQUEADO",
                btn_immersive: "MODO INMERSIVO",
                desc_immersive_1: "LIMPIAR PERFILES Y PAKS | NATIVE STEREO",
                desc_immersive_2: "LIMPIAR PERFILES | NATIVE STEREO",
                btn_vr: "MODO VR (RECOMENDADO)",
                desc_vr_1: "PERFIL UEVR | SIN PAKS | HEAD-AIMING",
                desc_vr_2: "APLICAR PERFIL ZIP | HEAD-AIMING",
                btn_full_vr: "MODO FULL VR",
                desc_full_vr_1: "PERFIL UEVR Y PAKS | MOTION CONTROLS",
                desc_full_vr_2: "APLICAR PERFIL ZIP | MOTION CONTROLS",
                btn_flat: "JUGAR EN MODO FLAT NORMAL",
                back_selector: "VOLVER AL SELECTOR DE CAPÍTULOS",
                boot_1: "Verificando integridad de archivos...",
                boot_2: "Cargando módulos de interfaz...",
                boot_3: "Sistema listo.",
                boot_init: "Iniciando sistema UEVR...",
                prep_vr_launch: "INICIANDO POPPY PLAYTIME EN VR...",
                prep_flat_launch: "INICIANDO POPPY PLAYTIME EN MODO FLAT...",
                err_unknown: "Ocurrió una anomalía desconocida en el sistema.",
                err_hint: "Verifica la integridad de tus archivos locales.",
                chapter: "CHAPTER",
                runtime_title: "SELECCIONAR ENTORNO VR",
                openxr_title: "OPENXR (PREDETERMINADO)",
                openxr_desc: "MÁS RÁPIDO, ALTO RENDIMIENTO, MÁXIMA CALIDAD.<br>VIRTUAL DESKTOP O META LINK.",
                openvr_title: "OPENVR / STEAMVR",
                openvr_desc: "MAYOR COMPATIBILIDAD CON VISORES.<br>REQUIERE STEAMVR ACTIVO.",
                btn_launch_modal: "INICIAR CAPÍTULO",
                update_title: "ACTUALIZACIÓN DISPONIBLE",
                update_desc: "¡Hay una nueva versión ({v}) disponible! Descárgala para disfrutar de nuevas funciones y mejoras.",
                btn_update_ignore: "MÁS TARDE",
                btn_update_download: "DESCARGAR"
            }
        };

        let currentLang = 'en';
        
        let currentUevrVersion = 'nightly';

        const t = (key) => i18n[currentLang][key] || key;

        const chaptersData = [
            { id: 1, name: "A TIGHT SQUEEZE", bg: "ch1.jpg" },
            { id: 2, name: "FLY IN A WEB", bg: "ch2.jpg" },
            { id: 3, name: "DEEP SLEEP", bg: "ch3.jpg" },
            { id: 4, name: "SAFE HAVEN", bg: "ch4.jpg" },
            { id: 5, name: "BROKEN THINGS", bg: "ch5.jpg" }
        ];

        let availableChapters = [];
        let activeChapterId = null;
        let isDetailView = false;
        let updateUrlToOpen = "";

        function toggleUevrVersion() {
            const btn = document.getElementById('btn-uevr-version');
            if (currentUevrVersion === 'stable') {
                currentUevrVersion = 'nightly';
                btn.textContent = 'UEVR NIGHTLY';
                btn.classList.add('bg-purple-900/40', 'border-purple-500/50', 'text-purple-200');
                btn.classList.remove('bg-white/10', 'border-white/20', 'text-white/80');
            } else {
                currentUevrVersion = 'stable';
                btn.textContent = 'UEVR STABLE';
                btn.classList.remove('bg-purple-900/40', 'border-purple-500/50', 'text-purple-200');
                btn.classList.add('bg-white/10', 'border-white/20', 'text-white/80');
            }
        }

        function applyStaticTranslations() {
            document.documentElement.lang = currentLang;
            document.getElementById('loading-main-text').textContent = t('prep_env');
            document.getElementById('loading-desc').innerHTML = t('prep_desc_boot');
            document.getElementById('error-title').textContent = t('fail_init');
            document.getElementById('btn-error-back-text').textContent = t('btn_back');
            document.getElementById('boot-text').textContent = t('boot_init');
        }

        document.addEventListener('DOMContentLoaded', () => {
            const progressBar = document.getElementById('boot-progress');
            const bootText = document.getElementById('boot-text');
            
            let progress = 0;
            let langFetched = false;

            const bootInterval = setInterval(async () => {
                progress += Math.random() * 15;
                if (progress > 100) progress = 100;
                progressBar.style.width = `${progress}%`;

                if (window.pywebview && window.pywebview.api && !langFetched) {
                    currentLang = await window.pywebview.api.get_language();
                    applyStaticTranslations();
                    langFetched = true;
                }

                if (!langFetched) return; 

                if(!bootText.textContent.includes("DOWNLOAD") && !bootText.textContent.includes("DESCARG")) {
                    if (progress > 30 && progress < 60) bootText.textContent = t('boot_1');
                    if (progress >= 60 && progress < 90) bootText.textContent = t('boot_2');
                    if (progress >= 90) bootText.textContent = t('boot_3');
                }

                if (progress === 100) {
                    clearInterval(bootInterval);
                    checkSystemAndLaunchUI();
                }
            }, 300); 
        });

        async function checkSystemAndLaunchUI() {
            try {
                await new Promise(resolve => setTimeout(resolve, 300));

                if (window.pywebview && window.pywebview.api) {
                    const checkResult = await window.pywebview.api.check_files();
                    if (checkResult.status === "success") {
                        availableChapters = checkResult.available_chapters || [];
                        transitionToMainUI();
                        checkForUpdates();
                    } else {
                        transitionToError(checkResult.message, checkResult.hint);
                    }
                } else {
                    setTimeout(() => {
                        availableChapters = [1, 2, 3, 4, 5]; 
                        applyStaticTranslations();
                        transitionToMainUI();
                    }, 500);
                }
            } catch (error) {
                transitionToError("Fallo de comunicación con el motor local.", error.message);
            }
        }

        async function checkForUpdates() {
            if (window.pywebview && window.pywebview.api) {
                const result = await window.pywebview.api.check_updates();
                if (result && result.update_available) {
                    showUpdateModal(result.version, result.url);
                }
            }
        }

        function showUpdateModal(version, url) {
            updateUrlToOpen = url;
            document.getElementById('update-modal').classList.remove('hidden');
            document.getElementById('update-modal').classList.add('flex');
            
            document.getElementById('update-title').textContent = t('update_title');
            document.getElementById('update-desc').innerHTML = t('update_desc').replace('{v}', version);
            document.getElementById('btn-update-ignore').textContent = t('btn_update_ignore');
            document.getElementById('btn-update-download').textContent = t('btn_update_download');
        }

        function closeUpdateModal() {
            document.getElementById('update-modal').classList.add('hidden');
            document.getElementById('update-modal').classList.remove('flex');
        }

        function openUpdateUrl() {
            if (window.pywebview && window.pywebview.api && updateUrlToOpen) {
                window.pywebview.api.open_url(updateUrlToOpen);
                closeUpdateModal();
            }
        }

        function transitionToError(message, hint) {
            const bootScreen = document.getElementById('boot-screen');
            const errorView = document.getElementById('error-view');
            
            bootScreen.classList.add('opacity-0', 'pointer-events-none');
            
            setTimeout(() => {
                bootScreen.style.display = 'none';
                errorView.classList.remove('hidden');
                errorView.classList.add('flex');
                
                document.getElementById('error-message').textContent = message || t('err_unknown');
                document.getElementById('error-hint').textContent = hint || t('err_hint');
                
                const btn = document.getElementById('btn-error-back-text');
                btn.textContent = t('btn_exit');
                btn.closest('button').onclick = closeApp;
            }, 500);
        }

        function transitionToMainUI() {
            const bootScreen = document.getElementById('boot-screen');
            const mainUI = document.getElementById('main-ui');
            
            bootScreen.classList.add('opacity-0', 'pointer-events-none');
            
            setTimeout(() => {
                bootScreen.style.display = 'none';
                mainUI.classList.remove('opacity-0', 'pointer-events-none');
                mainUI.classList.add('pointer-events-auto');
                
                renderDynamicUI();
            }, 1000); 
        }

        function renderDynamicUI() {
            const container = document.getElementById('dynamic-view');
            container.innerHTML = '';

            if (!isDetailView) {
                const galleryWrapper = document.createElement('div');
                galleryWrapper.className = 'absolute inset-[-10%] w-[120%] h-[120%] -top-[10%] flex overflow-hidden z-0 fade-in';
                
                chaptersData.forEach((ch) => {
                    const isAvailable = availableChapters.includes(ch.id);

                    const panel = document.createElement('div');
                    panel.className = 'pywebview-no-drag relative h-full transition-all duration-700 ease-[cubic-bezier(0.25,1,0.5,1)] transform -skew-x-[15deg] overflow-hidden border-r border-white/5 group flex-1 cursor-pointer hover:flex-[1.5] bg-[#050505]';
                    
                    panel.onclick = () => {
                        activeChapterId = ch.id;
                        isDetailView = true;
                        renderDynamicUI();
                    };

                    let shiftClass = '';
                    if (ch.id === 1) shiftClass = 'translate-x-[8vw] md:translate-x-[6vw]';
                    if (ch.id === chaptersData.length) shiftClass = '-translate-x-[8vw] md:-translate-x-[6vw]';

                    panel.innerHTML = `
                        <div class="absolute inset-[-50%] transform skew-x-[15deg] scale-[1.2] origin-center bg-black">
                            <img src="${ch.bg}" class="w-full h-full object-cover transition-all duration-[1000ms] grayscale opacity-20 group-hover:opacity-60 group-hover:grayscale-[20%]" alt="Chapter ${ch.id}" />
                            <div class="absolute inset-0 bg-black/50 group-hover:bg-black/20 transition-all duration-500"></div>
                        </div>

                        <div class="absolute inset-0 flex items-center justify-center pointer-events-none z-10 px-2 overflow-hidden">
                            <div class="relative w-full h-full flex items-center justify-center ${shiftClass}">
                                <span class="text-white/40 group-hover:text-white transition-colors duration-500 text-3xl md:text-5xl tracking-[0.3em] font-bold uppercase whitespace-nowrap transform -rotate-90">
                                    ${t('chapter')} ${ch.id}
                                </span>
                                ${!isAvailable ? `<svg class="absolute bottom-16 md:bottom-20 w-5 h-5 md:w-6 md:h-6 text-white/20" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg>` : ''}
                            </div>
                        </div>
                    `;
                    galleryWrapper.appendChild(panel);
                });

                container.appendChild(galleryWrapper);
                container.insertAdjacentHTML('beforeend', `
                    <div class="absolute inset-0 bg-gradient-to-t from-black via-transparent to-transparent z-10 pointer-events-none fade-in"></div>
                    <div class="absolute inset-0 bg-gradient-to-b from-black/80 via-transparent to-transparent z-10 pointer-events-none fade-in"></div>
                `);

            } else {
                const ch = chaptersData.find(c => c.id === activeChapterId);
                const isAvailable = availableChapters.includes(ch.id);

                const detailWrapper = document.createElement('div');
                detailWrapper.className = 'absolute inset-0 w-full h-full card-enter';

                const bgFull = document.createElement('div');
                bgFull.className = 'absolute inset-0 w-full h-full z-0 bg-black overflow-hidden';
                bgFull.innerHTML = `
                    <img src="${ch.bg}" class="w-full h-full object-cover opacity-60 grayscale-[30%] zoom-in-bg" alt="${ch.name}" />
                    <div class="absolute inset-0 bg-gradient-to-t from-black via-black/70 to-transparent"></div>
                    <div class="absolute inset-0 bg-gradient-to-b from-black/50 via-transparent to-transparent"></div>
                `;
                detailWrapper.appendChild(bgFull);

                let buttonsHTML = '';
                if (isAvailable) {
                    if (ch.id === 1 || ch.id === 2) {
                        buttonsHTML = `
                            <div class="flex flex-col gap-3 w-full max-w-sm mx-auto pointer-events-auto">
                                <button onclick="launchGame(${ch.id}, 'immersive')" 
                                        class="pywebview-no-drag flex flex-col items-center justify-center w-full px-6 py-3 rounded-full bg-white/5 border border-white/20 hover:bg-white/20 hover:border-white/50 transition-all duration-300 backdrop-blur-sm">
                                    <span class="text-xs font-bold tracking-[0.2em] uppercase text-white">${t('btn_immersive')}</span>
                                    <span class="text-[9px] tracking-[0.1em] text-white/50 mt-1">${t('desc_immersive_1')}</span>
                                </button>

                                <button onclick="showRuntimeModal(${ch.id}, 'vr')" 
                                        class="pywebview-no-drag flex flex-col items-center justify-center w-full px-6 py-3 rounded-full bg-white text-black hover:bg-white/80 transition-all duration-300 shadow-[0_0_15px_rgba(255,255,255,0.2)] group">
                                    <span class="text-xs font-bold tracking-[0.2em] uppercase">${t('btn_vr')}</span>
                                    <span class="text-[9px] tracking-[0.1em] text-black/60 mt-1">${t('desc_vr_1')}</span>
                                </button>

                                <button onclick="showRuntimeModal(${ch.id}, 'full_vr')" 
                                        class="pywebview-no-drag flex flex-col items-center justify-center w-full px-6 py-3 rounded-full bg-white/10 border border-white/30 hover:bg-white/30 transition-all duration-300 backdrop-blur-sm group">
                                    <span class="text-xs font-bold tracking-[0.2em] uppercase text-white">${t('btn_full_vr')}</span>
                                    <span class="text-[9px] tracking-[0.1em] text-white/70 mt-1">${t('desc_full_vr_1')}</span>
                                </button>
                                
                                <button onclick="launchGame(${ch.id}, 'flat')" 
                                        class="pywebview-no-drag flex flex-col items-center justify-center w-full px-6 py-2 mt-2 rounded-full bg-transparent border border-transparent hover:border-white/10 hover:bg-white/5 transition-all duration-300 backdrop-blur-sm">
                                    <span class="text-[10px] font-bold tracking-[0.2em] uppercase text-white/30 hover:text-white/60">${t('btn_flat')}</span>
                                </button>
                            </div>
                        `;
                    } else if (ch.id === 3 || ch.id === 4) {
                        buttonsHTML = `
                            <div class="flex flex-col gap-3 w-full max-w-sm mx-auto pointer-events-auto">
                                <button onclick="launchGame(${ch.id}, 'immersive')" 
                                        class="pywebview-no-drag flex flex-col items-center justify-center w-full px-6 py-3 rounded-full bg-white/5 border border-white/20 hover:bg-white/20 hover:border-white/50 transition-all duration-300 backdrop-blur-sm">
                                    <span class="text-xs font-bold tracking-[0.2em] uppercase text-white">${t('btn_immersive')}</span>
                                    <span class="text-[9px] tracking-[0.1em] text-white/50 mt-1">${t('desc_immersive_2')}</span>
                                </button>

                                <button onclick="showRuntimeModal(${ch.id}, 'full_vr')" 
                                        class="pywebview-no-drag flex flex-col items-center justify-center w-full px-6 py-3 rounded-full bg-white text-black hover:bg-white/80 transition-all duration-300 shadow-[0_0_15px_rgba(255,255,255,0.2)] group">
                                    <span class="text-xs font-bold tracking-[0.2em] uppercase">${t('btn_full_vr')}</span>
                                    <span class="text-[9px] tracking-[0.1em] text-black/60 mt-1">${t('desc_full_vr_2')}</span>
                                </button>
                                
                                <button onclick="launchGame(${ch.id}, 'flat')" 
                                        class="pywebview-no-drag flex flex-col items-center justify-center w-full px-6 py-2 mt-2 rounded-full bg-transparent border border-transparent hover:border-white/10 hover:bg-white/5 transition-all duration-300 backdrop-blur-sm">
                                    <span class="text-[10px] font-bold tracking-[0.2em] uppercase text-white/30 hover:text-white/60">${t('btn_flat')}</span>
                                </button>
                            </div>
                        `;
                    } else {
                        buttonsHTML = `
                            <div class="flex flex-col gap-3 w-full max-w-sm mx-auto pointer-events-auto">
                                <button onclick="launchGame(${ch.id}, 'immersive')" 
                                        class="pywebview-no-drag flex flex-col items-center justify-center w-full px-6 py-3 rounded-full bg-white/5 border border-white/20 hover:bg-white/20 hover:border-white/50 transition-all duration-300 backdrop-blur-sm">
                                    <span class="text-xs font-bold tracking-[0.2em] uppercase text-white">${t('btn_immersive')}</span>
                                    <span class="text-[9px] tracking-[0.1em] text-white/50 mt-1">${t('desc_immersive_2')}</span>
                                </button>

                                <button onclick="showRuntimeModal(${ch.id}, 'vr')" 
                                        class="pywebview-no-drag flex flex-col items-center justify-center w-full px-6 py-3 rounded-full bg-white text-black hover:bg-white/80 transition-all duration-300 shadow-[0_0_15px_rgba(255,255,255,0.2)] group">
                                    <span class="text-xs font-bold tracking-[0.2em] uppercase">${t('btn_vr')}</span>
                                    <span class="text-[9px] tracking-[0.1em] text-black/60 mt-1">${t('desc_vr_2')}</span>
                                </button>

                                <button onclick="launchGame(${ch.id}, 'flat')" 
                                        class="pywebview-no-drag flex flex-col items-center justify-center w-full px-6 py-2 mt-2 rounded-full bg-transparent border border-transparent hover:border-white/10 hover:bg-white/5 transition-all duration-300 backdrop-blur-sm">
                                    <span class="text-[10px] font-bold tracking-[0.2em] uppercase text-white/30 hover:text-white/60">${t('btn_flat')}</span>
                                </button>
                            </div>
                        `;
                    }
                } else {
                    buttonsHTML = `
                        <div class="px-12 py-4 rounded-full bg-white/5 border border-white/10 text-white/30 text-xs font-bold tracking-[0.2em] uppercase flex items-center gap-3 backdrop-blur-sm cursor-not-allowed mx-auto w-max">
                            <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z"></path></svg> 
                            ${t('ch_locked')}
                        </div>
                    `;
                }

                const frontUI = document.createElement('div');
                frontUI.className = 'absolute inset-0 flex flex-col justify-end items-center pb-12 md:pb-16 z-20 pointer-events-none px-6';
                frontUI.innerHTML = `
                    <div class="flex flex-col items-center w-full max-w-4xl text-center">
                        <h3 class="text-white/50 tracking-[0.5em] text-sm mb-2">${t('chapter')} 0${ch.id}</h3>
                        <h2 class="text-4xl md:text-6xl text-white tracking-widest drop-shadow-2xl mb-8 uppercase leading-tight">${ch.name}</h2>
                        
                        <div class="w-full mb-6">
                            ${buttonsHTML}
                        </div>

                        <button onclick="goBack()" class="pywebview-no-drag group flex items-center gap-3 text-white/50 hover:text-white transition-all cursor-pointer pointer-events-auto mt-4">
                            <div class="w-10 h-10 rounded-full border border-white/20 flex items-center justify-center group-hover:bg-white group-hover:text-black transition-all duration-300">
                                <svg class="w-4 h-4 pointer-events-none" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10 19l-7-7m0 0l7-7m-7 7h18"></path></svg>
                            </div>
                            <span class="text-[10px] tracking-[0.3em] font-bold uppercase pointer-events-none">${t('back_selector')}</span>
                        </button>
                    </div>
                `;
                
                detailWrapper.appendChild(frontUI);
                container.appendChild(detailWrapper);
            }
        }

        function goBack() {
            isDetailView = false;
            activeChapterId = null;
            renderDynamicUI();
        }

        function closeApp() {
            if (window.pywebview) window.pywebview.api.close_app();
            else console.log("Cerrando...");
        }

        let pendingLaunch = null;
        let selectedRuntime = 'openxr';

        function showRuntimeModal(chapterId, mode) {
            pendingLaunch = { chapterId, mode };
            document.getElementById('runtime-modal').classList.remove('hidden');
            document.getElementById('runtime-modal').classList.add('flex');
            
            selectRuntime('openxr');
            
            document.getElementById('modal-title').textContent = t('runtime_title');
            document.getElementById('txt-openxr-title').textContent = t('openxr_title');
            document.getElementById('txt-openxr-desc').innerHTML = t('openxr_desc');
            document.getElementById('txt-openvr-title').textContent = t('openvr_title');
            document.getElementById('txt-openvr-desc').innerHTML = t('openvr_desc');
            document.getElementById('btn-modal-launch').textContent = t('btn_launch_modal');
        }

        function closeRuntimeModal() {
            document.getElementById('runtime-modal').classList.add('hidden');
            document.getElementById('runtime-modal').classList.remove('flex');
            pendingLaunch = null;
        }

        function selectRuntime(runtime) {
            selectedRuntime = runtime;
            const optXr = document.getElementById('opt-openxr');
            const dotXr = document.getElementById('dot-openxr');
            const optVr = document.getElementById('opt-openvr');
            const dotVr = document.getElementById('dot-openvr');

            if (runtime === 'openxr') {
                optXr.classList.add('border-white', 'bg-white/5');
                optXr.classList.remove('border-white/10', 'bg-black/50');
                dotXr.classList.replace('scale-0', 'scale-100');
                
                optVr.classList.remove('border-white', 'bg-white/5');
                optVr.classList.add('border-white/10', 'bg-black/50');
                dotVr.classList.replace('scale-100', 'scale-0');
            } else {
                optVr.classList.add('border-white', 'bg-white/5');
                optVr.classList.remove('border-white/10', 'bg-black/50');
                dotVr.classList.replace('scale-0', 'scale-100');
                
                optXr.classList.remove('border-white', 'bg-white/5');
                optXr.classList.add('border-white/10', 'bg-black/50');
                dotXr.classList.replace('scale-100', 'scale-0');
            }
        }

        function confirmRuntimeAndLaunch() {
            if (pendingLaunch) {
                const { chapterId, mode } = pendingLaunch;
                closeRuntimeModal();
                launchGame(chapterId, mode, selectedRuntime);
            }
        }

        async function launchGame(chapterId, mode, runtimeOverride = 'openxr') {
            const loadingView = document.getElementById('loading-view');
            const loadingBg = document.getElementById('loading-bg');
            const mainText = document.getElementById('loading-main-text');
            
            const targetChapter = chaptersData.find(c => c.id === chapterId);
            loadingBg.src = targetChapter ? targetChapter.bg : '';
            
            loadingView.classList.remove('hidden');
            loadingView.classList.add('flex');

            // Establecemos la nueva descripción global al iniciar cualquier capítulo
            document.getElementById('loading-desc').innerHTML = t('prep_desc_launch');

            if (mode === 'flat') {
                mainText.textContent = t('prep_flat_launch');
            } else {
                mainText.textContent = t('prep_vr_launch');
            }

            if (window.pywebview) {
                let result;
                if (mode === 'flat') {
                    result = await window.pywebview.api.launch_flat(chapterId);
                } else {
                    result = await window.pywebview.api.launch_vr(chapterId, mode, currentUevrVersion, runtimeOverride); 
                }

                if (result && result.status === "error") { 
                    showErrorState(result.message, result.hint);
                }
            }
        }

        function showErrorState(message, hint) {
            const loadingView = document.getElementById('loading-view');
            const errorView = document.getElementById('error-view');
            
            loadingView.classList.add('hidden');
            loadingView.classList.remove('flex');

            errorView.classList.remove('hidden');
            errorView.classList.add('flex');
            
            document.getElementById('error-message').textContent = message || t('err_unknown');
            document.getElementById('error-hint').textContent = hint || t('err_hint');

            const btn = document.getElementById('btn-error-back-text');
            btn.textContent = t('btn_back');
            btn.closest('button').onclick = resetUI;
        }

        function resetUI() {
            const loadingView = document.getElementById('loading-view');
            const errorView = document.getElementById('error-view');

            loadingView.classList.add('hidden');
            loadingView.classList.remove('flex');
            errorView.classList.add('hidden');
            errorView.classList.remove('flex');
        }
    </script>
</body>
</html>
